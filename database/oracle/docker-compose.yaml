services:
  oracle:
    image: gvenzl/oracle-free:23-slim
    container_name: some-oracle

    ports:
      - "1521:1521"

    environment:
      ORACLE_PASSWORD: ${ORACLE_PASSWORD:-change_me}

    volumes:
      - data:/opt/oracle/oradata

    networks:
      - oracle-network

    restart: unless-stopped

    healthcheck:
      test:
        [
          "CMD-SHELL",
          "echo 'select 1 from dual;' | sqlplus -s system/$${ORACLE_PASSWORD}@localhost:1521/FREEPDB1 || exit 1",
        ]
      interval: 20s
      timeout: 10s
      retries: 10

    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

    # ports:
    #   - "127.0.0.1:1433:1433"

networks:
  oracle-network:
    driver: bridge

volumes:
  data:
